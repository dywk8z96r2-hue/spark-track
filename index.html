<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#050D1E">
<title>SparkTrack</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #050D1E;
    color: #E8F0FE;
    font-family: 'DM Sans', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .container {
    text-align: center;
    padding: 40px 32px;
    max-width: 380px;
    width: 100%;
  }
  .icon {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, #1A3A6B, #0A1E40);
    border-radius: 22px;
    border: 1px solid rgba(0,212,255,0.3);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 0 40px rgba(0,212,255,0.15);
  }
  .icon svg { width: 44px; height: 44px; }
  .title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 32px;
    font-weight: 800;
    color: #00D4FF;
    letter-spacing: -1px;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 15px;
    color: #6B8FAF;
    margin-bottom: 40px;
    line-height: 1.5;
  }
  .detecting {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #6B8FAF;
    margin-bottom: 16px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid rgba(0,212,255,0.15);
    border-top-color: #00D4FF;
    border-radius: 50%;
    margin: 0 auto 32px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px 0;
  }
  .divider-line { flex: 1; height: 1px; background: rgba(0,212,255,0.12); }
  .divider-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #3D5A80;
  }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 10px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-ios { background: #00D4FF; color: #000; }
  .btn-android { background: #0F1F38; color: #A8C4E0; border: 1px solid rgba(0,212,255,0.22); }
  .btn svg { width: 18px; height: 18px; flex-shrink: 0; }
  .redirect-msg {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #3D5A80;
    margin-top: 24px;
  }
  .redirect-msg span { color: #00D4FF; }
  #auto-section { display: block; }
  #manual-section { display: none; }
</style>
</head>
<body>
<div class="container">

  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M13 2L4.5 13.5H11L10 22L19.5 10H13L13 2Z" fill="#FFD600" stroke="#FFD600" stroke-width="1" stroke-linejoin="round"/>
    </svg>
  </div>

  <div class="title">SparkTrack</div>
  <div class="subtitle">Trip tracker for Spark Drivers</div>

  <!-- AUTO DETECT STATE -->
  <div id="auto-section">
    <div class="detecting">Detecting your device</div>
    <div class="spinner"></div>
    <div class="redirect-msg" id="redirect-msg"></div>
  </div>

  <!-- MANUAL FALLBACK (desktop or unrecognized device) -->
  <div id="manual-section">
    <a class="btn btn-ios" href="sparktrack_ios.html">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
      Open on iPhone
    </a>
    <a class="btn btn-android" href="sparktrack_android.html">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.6 9.48l1.84-3.18c.16-.31.04-.69-.26-.85-.29-.15-.65-.06-.83.22l-1.88 3.24C14.93 8.31 13.5 8 12 8s-2.93.31-4.47.91L5.65 5.67c-.19-.29-.54-.38-.83-.22-.3.16-.42.54-.26.85L6.4 9.48C3.3 11.25 1.28 14.44 1 18h22c-.28-3.56-2.3-6.75-5.4-8.52zM7 15.25c-.69 0-1.25-.56-1.25-1.25S6.31 12.75 7 12.75s1.25.56 1.25 1.25-.56 1.25-1.25 1.25zm10 0c-.69 0-1.25-.56-1.25-1.25s.56-1.25 1.25-1.25 1.25.56 1.25 1.25-.56 1.25-1.25 1.25z"/></svg>
      Open on Android
    </a>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">or</div>
      <div class="divider-line"></div>
    </div>
    <div class="redirect-msg">Tap the link that matches your phone</div>
  </div>

</div>
<script>
  const IOS_URL = 'sparktrack_ios.html';
  const ANDROID_URL = 'sparktrack_android.html';

  window.addEventListener('DOMContentLoaded', () => {
    const cached = localStorage.getItem('st_os');
    if (cached === 'ios') {
      window.location.href = IOS_URL;
      return;
    }
    if (cached === 'android') {
      window.location.href = ANDROID_URL;
      return;
    }

    const ua = navigator.userAgent || '';
    const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
    const isAndroid = /Android/.test(ua);

    if (isIOS) {
      localStorage.setItem('st_os', 'ios');
      document.getElementById('redirect-msg').innerHTML = 'Redirecting to <span>iPhone</span> version\u2026';
      setTimeout(() => { window.location.href = IOS_URL; }, 1200);
    } else if (isAndroid) {
      localStorage.setItem('st_os', 'android');
      document.getElementById('redirect-msg').innerHTML = 'Redirecting to <span>Android</span> version\u2026';
      setTimeout(() => { window.location.href = ANDROID_URL; }, 1200);
    } else {
      document.getElementById('auto-section').style.display = 'none';
      document.getElementById('manual-section').style.display = 'block';
    }
  });
</script>
</body>
</html>
